<!doctype html>
<html lang="hu">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bejelentkezés</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="KretaBejelentkezes.css">
</head>

<body>
    <main class="flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="auth-wrapper">
            <div class="row g-5">

                <!-- Bejelentkezés -->
                <div class="col-md-6 align-self-center">
                    <form id="login-form">
                        <div class="auth-card p-4 p-md-5">
                            <h2 class="mb-4">Bejelentkezés</h2>

                            <label for="login-username" class="form-label">Név:</label>
                            <input
                                type="text"
                                id="login-username"
                                name="username"
                                required
                                class="form-control mb-3"
                            >

                            <label for="login-password" class="form-label">Jelszó:</label>
                            <input
                                type="password"
                                id="login-password"
                                name="password"
                                required
                                class="form-control mb-4"
                            >

                            <button class="btn-custom w-100" type="submit">Bejelentkezés</button>

                            <div id="login-message" class="mt-3"></div>
                        </div>
                    </form>
                </div>

                <!-- Regisztráció -->
                <div class="col-md-6">
                    <form id="register-form">
						<div class="auth-card p-4 p-md-5">
							<label class="form-label">Név:</label>
							<input type="text" name="username" class="form-control mb-3" required>

							<label class="form-label">Jelszó:</label>
							<input type="password" name="password" class="form-control mb-3" required>

							<label class="form-label">Lakcím:</label>
							<input type="text" name="address" class="form-control mb-3">

							<label class="form-label">Szülő neve:</label>
							<input type="text" name="parentName" class="form-control mb-3">

							<label class="form-label">Email:</label>
							<input type="email" name="email" class="form-control mb-4">

							<button class="btn-custom w-100" type="submit">Regisztráció</button>
							<div id="register-message" class="mt-3"></div>
						</div>
					</form>
                </div>

            </div>
        </div>
    </main>

    <footer class="footer text-center mt-4">
        <a href="#">Adatkezelési tájékoztató</a><br>
        Verzió: 1.0.0 - (2026.03.04.)<br><br>
        Támogatott böngészők:<br>
        Google Chrome, Mozilla Firefox, Opera, Microsoft Edge<br><br>
        Készítette: Seres Dániel és Bagó Norman
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="KretaBejelentkezes.js"></script>
</body>
</html>
