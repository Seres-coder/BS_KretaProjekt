<!doctype html>
<html lang="hu">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bejelentkezés</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="KretaBejelentkezes.css">
</head>

<body>
     <main>
        <div class="auth-wrapper">
            <div class="auth-card">
                <form id="login-form">
                    <h2 class="mb-4">Bejelentkezés</h2>

                    <label for="login-username" class="form-label">Név:</label>
                    <input type="text" id="login-username" name="username" required class="form-control mb-3">

                    <label for="login-password" class="form-label">Jelszó:</label>
                    <input type="password" id="login-password" name="password" required class="form-control mb-4">

                    <button class="btn-custom" type="submit">Bejelentkezés</button>

                    <div id="login-message" class="mt-3"></div>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer text-center mt-4">
        <a href="#">Adatkezelési tájékoztató</a><br>
        Verzió: 1.0.0 - (2026.03.04.)<br><br>
        Támogatott böngészők:<br>
        Google Chrome, Mozilla Firefox, Opera, Microsoft Edge<br><br>
        Készítette: Seres Dániel és Bagó Norman
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="KretaBejelentkezes.js"></script>
</body>
</html>
