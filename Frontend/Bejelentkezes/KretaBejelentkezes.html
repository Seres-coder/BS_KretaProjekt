<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Kréta – Bejelentkezés</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="KretaBejelentkezes.css"/>
</head>
<body>
    <main class="d-flex align-items-center justify-content-center flex-grow-1 py-4">
        <div class="auth-wrapper">
            <div class="auth-card">
                <div class="card-header">
                    <span class="header-title">KRÉTA</span>
                </div>
                <div class="card-body">
                    <form id="login-form">
                        <div class="mb-3">
                            <label for="username" class="form-label">Felhasználónév</label>
                            <input type="text" id="username" name="username" class="form-control" placeholder="Felhasználónév"/>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Jelszó</label>
                            <input type="password" id="password" name="password" class="form-control" placeholder="Jelszó"/>
                        </div>
                        <div id="login-message" class="mt-3"></div>
                        <button type="submit" class="btn-custom">Belépés</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <p class="mb-0">2025 Kréta – Minden jog fenntartva</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="KretaBejelentkezes.js"></script>
</body>
</html>
