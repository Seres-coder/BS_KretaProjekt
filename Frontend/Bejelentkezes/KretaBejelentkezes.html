<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bejelentkezés</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="KretaBejelentkezes.css">
</head>

<body>
<main class="flex-grow-1 d-flex align-items-center justify-content-center">
	<div class="auth-wrapper">
		<div class="row g-5">
			<div class="col-md-6 align-self-center">
				<div class="auth-card p-4 p-md-5">
					<label class="form-label">Név:</label>
					<input type="text" class="form-control mb-3">
					<label class="form-label">Jelszó:</label>
					<input type="password" class="form-control mb-4">
					<button class="btn-custom w-100"onclick="window.location.href='../Menu/KretaMenu.html'">Bejelentkezés</button>
				</div>
			</div>
			<div class="col-md-6">
				<div class="auth-card p-4 p-md-5">
					<label class="form-label">Név:</label>
					<input type="text" class="form-control mb-3">
					<label class="form-label">Jelszó:</label>
					<input type="password" class="form-control mb-3">
					<label class="form-label">Lakcím:</label>
					<input type="text" class="form-control mb-3">
					<label class="form-label">Szülő neve:</label>
					<input type="text" class="form-control mb-3">
					<label class="form-label">Email:</label>
					<input type="email" class="form-control mb-4">
					<button class="btn-custom w-100" onclick="window.location.href='../Menu/KretaMenu.html'">Regisztráció</button>
				</div>
			</div>
		</div>
	</div>
</main>

</body>
</html>
