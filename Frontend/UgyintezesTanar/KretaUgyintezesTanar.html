<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÜgyintézésTanárok</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="KretaUgyintezesTanar.css">
</head>
<body>

    <div class="sidebar" id="sidebar">
        <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
        <nav class="nav flex-column">
            <a class="nav-link" onclick="window.location.href='../Menu/KretaMenu.html'">Menü</a>
            <a class="nav-link" onclick="window.location.href='../Jegyek/KretaJegyek.html'">Jegyek</a>
            <a class="nav-link" onclick="window.location.href='../Orarend/KretaOrarend.html'">Órarend</a>

            <br>Üzenetek:
            <nav>
                <button class="nav-link" data-view="bejovo-uzenetek-panel">Bejövő Üzenetek</button>
                <button class="nav-link" data-view="uzenet-iras-panel">Üzenet Írása</button>
            </nav>

            <br>Adatok:
            <nav>
                <button class="nav-link" data-view="adatok-panel">Adataim</button>
                <button class="nav-link" data-view="diakok-panel">Diákok Adatai</button>
            </nav>
        </nav>
    </div>

    <div class="content" id="content">

        <section id="bejovo-uzenetek-panel" class="panel active">
            <div class="container-fluid mt-4">
                <h2 class="mb-4"><br>Bejövő üzenetek</h2>
                <div class="row g-3">
                    <div class="col-md-4">
                        <div class="list-group" id="lista">
                            <button class="list-group-item list-group-item-action" onclick="mutat(0)">
                                <b>Osztályfőnök</b><br>
                                Szülői értekezlet<br>
                                <small>2026.03.05</small>
                            </button>

                            <button class="list-group-item list-group-item-action" onclick="mutat(1)">
                                <b>Igazgatóság</b><br>
                                Tanév rendje<br>
                                <small>2026.03.04</small>
                            </button>

                            <button class="list-group-item list-group-item-action" onclick="mutat(2)">
                                <b>Matektanár</b><br>
                                Dolgozat<br>
                                <small>2026.03.03</small>
                            </button>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="card shadow-sm">
                            <div class="card-body" id="uzenet">
                                Kattints egy üzenetre
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="uzenet-iras-panel" class="panel">
            <div class="container mt-4">
                <h2>Üzenet írása</h2>

                <div class="card shadow-sm mt-3">
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Címzett</label>
                            <input type="text" class="form-control" id="cimzett" placeholder="pl. Osztályfőnök">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Téma</label>
                            <input type="text" class="form-control" id="tema">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Üzenet</label>
                            <textarea class="form-control" id="szoveg" rows="5"></textarea>
                        </div>

                        <button class="btn btn-primary" onclick="kuldes()">Üzenet küldése</button>
                        <p id="uzenetStatus" class="mt-3"></p>
                    </div>
                </div>
            </div>
        </section>

        <section id="adatok-panel" class="panel">
            <div class="container mt-4">
                <h2>Adataim</h2>

                <div class="card shadow-sm mt-3">
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label"><b>Név:</b></label>
                            <input type="text" class="form-control" id="tanar_nev" value="Kovács Anna" disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><b>Szak:</b></label>
                            <input type="text" class="form-control" id="tanar_szak" value="Matematika - Fizika" disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><b>Születési dátum:</b></label>
                            <input type="date" class="form-control" id="tanar_szuletes" value="1985-04-15" disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><b>Lakcím:</b></label>
                            <input type="text" class="form-control" id="tanar_lakcim" value="1111 Budapest, Tanár utca 12." disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><b>Email:</b></label>
                            <input type="email" class="form-control" id="tanar_email" value="kovacs.anna@iskola.hu" disabled>
                        </div>

                        <button class="btn btn-warning" onclick="modositas()">Módosítás</button>
                        <button class="btn btn-success" onclick="mentes()" id="mentesGomb" style="display:none;">Mentés</button>
                    </div>
                </div>
            </div>
        </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="KretaUgyintezesTanar.js"></script>
</body>
</html>
