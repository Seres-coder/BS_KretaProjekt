<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Felulet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Admin.css">
</head>
<body>
      <div class="sidebar" id="sidebar">
        <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
        <nav class="nav flex-column">
            <br>Üzenetek:
            <nav>
                <button class="nav-link" data-panel-target="uzenet-iras-panel">Üzenet Írása</button>
            </nav>
            <br>Adatok:
            <nav>
                <button class="nav-link" data-panel-target="diak-adatok-panel">Diákok Adatai</button>
            </nav>

            <br>Órarend:
            <nav>
                <button class="nav-link" data-panel-target="orarend-panel">Órarendek</button>
                <button class="nav-link" data-panel-target="orarendModositas">Órarend Módosítása</button>
            </nav>
            <br>Regisztrácíó:
            <nav>
                <button class="nav-link" data-panel-target="diakRegPanel">Diák Regisztrácíó</button>
                <button class="nav-link" data-panel-target="tanarRegPanel">Tanár Regisztrácíó</button>
            </nav>
        </nav>
    </div>
    <div class="content" id="content">
   <section id="uzenet-iras-panel" class="panel active">
            <div class="container mt-4">
                <h2>Üzenet írása</h2>

                <div class="card shadow-sm mt-3">
                    <div class="card-body">

                        <div class="mb-3">
                            <label class="form-label">Címzett</label>
                            <select id="cimzett" class="form-control">
                                <option value="">-- Válassz tanárt --</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Téma</label>
                            <input type="text" class="form-control" id="tema">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Üzenet</label>
                            <textarea class="form-control" id="szoveg" rows="5"></textarea>
                        </div>

                        <button class="btn btn-primary" onclick="kuldes()">Üzenet küldése</button>

                        <p id="uzenetStatus" class="mt-3"></p>

                    </div>
                </div>
            </div>
        </section>

        

        <section id="diak-adatok-panel" class="panel">
        <div class="container mt-4">
            <h2>Diákok Adatai</h2>
            <div class="card shadow-sm mt-3">
                <div class="card-body">

                    <label class="form-label"><b>Diák választása:</b></label>
                    <select class="form-select mb-3" id="diakValaszto" onchange="diakAdatokBetoltese()">
                        <option value="">-- Válassz diákot --</option>
                    </select>

                    <div id="diakAdatokForm" style="display:none;">
                        <div class="mb-3">
                            <label class="form-label"><b>Név:</b></label>
                            <input type="text" class="form-control" id="diakNev" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><b>Lakcím:</b></label>
                            <input type="text" class="form-control" id="diakLakcim" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><b>Email:</b></label>
                            <input type="email" class="form-control" id="diakEmail" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><b>Szülő neve:</b></label>
                            <input type="text" class="form-control" id="diakSzulo" disabled>
                        </div>

                        <button class="btn btn-warning" onclick="diakModositas()">Módosítás</button>
                        <button class="btn btn-success" id="diakMentesGomb" style="display:none;" onclick="diakMentes()">Mentés</button>
                        <button class="btn btn-danger ms-2" onclick="diakTorles()">Törlés</button>
                        <p id="diakStatus" class="mt-3"></p>
                    </div>

                </div>
            </div>
        </div>
    </section>
       <section id="orarend-panel" class="panel">
            <div class="container mt-4">
                <h2>Órarendek</h2>
                <div class="card shadow-sm mt-3">
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label"><b>Osztály kiválasztása:</b></label>
                            <select class="form-select" id="osztalySelect" onchange="orarendBetoltes()">
                                <option value="">-- Válassz osztályt --</option>
                            </select>
                        </div>
                        <div id="orarendContainer">
                            <p>Válassz egy osztályt az órarend megtekintéséhez.</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

       <section id="orarendModositas" class="panel" style="display:none;">
        <br>
        <br>
        <h2>Órarend módosítása</h2>
        <div class="mod-orarend-box">
            <label>Osztály kiválasztása:</label>
            <select id="modOsztalySelect" class="mod-osztaly-select">
                <option value="">-- Válassz osztályt --</option>
            </select>
            <button onclick="modOrarendBetoltes()" class="mod-orarend-btn">
                Órarend betöltése
            </button>
            <div id="modOrarendContainer">
                <p>Válassz egy osztályt az órarend módosításához.</p>
            </div>
            <p id="modOrarendStatus" class="mt-2"></p>
        </div>
    </section>

    <!-- Diák regisztráció -->
    <section class="panel" id="diakRegPanel" style="display:none;">
        <div class="d-flex justify-content-center align-items-start pt-4">
            <div class="card p-4 reg-card">
                <h4 class="mb-3">Diák regisztrálása</h4>
                <div class="mb-2">
                    <label class="form-label">Belépési név</label>
                    <input type="text" id="regDiakBelepes" class="form-control" autocomplete="off">
                </div>
                <div class="mb-2">
                    <label class="form-label">Jelszó</label>
                    <input type="password" id="regDiakJelszo" class="form-control">
                </div>
                <div class="mb-2">
                    <label class="form-label">Teljes név</label>
                    <input type="text" id="regDiakNev" class="form-control">
                </div>
                <div class="mb-2">
                    <label class="form-label">Email</label>
                    <input type="email" id="regDiakEmail" class="form-control">
                </div>
                <div class="mb-2">
                    <label class="form-label">Lakcím</label>
                    <input type="text" id="regDiakLakcim" class="form-control">
                </div>
                <div class="mb-2">
                    <label class="form-label">Szülő neve</label>
                    <input type="text" id="regDiakSzulo" class="form-control">
                </div>
                <div class="mb-2">
                    <label class="form-label">Születési dátum</label>
                    <input type="date" id="regDiakSzuletes" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Osztály</label>
                    <select id="regDiakOsztaly" class="form-select">
                        <option value="">-- Válassz osztályt --</option>
                    </select>
                </div>
                <button class="btn btn-success" onclick="diakRegisztracio()">Regisztrálás</button>
                <p id="regDiakStatus" class="mt-2"></p>
            </div>
        </div>
    </section>

    <!-- Tanár regisztráció -->
    <section class="panel" id="tanarRegPanel" style="display:none;">
        <div class="d-flex justify-content-center align-items-start pt-4">
            <div class="card p-4 reg-card">
                <h4 class="mb-3">Tanár regisztrálása</h4>
                <div class="mb-2">
                    <label class="form-label">Belépési név</label>
                    <input type="text" id="regTanarBelepes" class="form-control" autocomplete="off">
                </div>
                <div class="mb-2">
                    <label class="form-label">Jelszó</label>
                    <input type="password" id="regTanarJelszo" class="form-control">
                </div>
                <div class="mb-2">
                    <label class="form-label">Teljes név</label>
                    <input type="text" id="regTanarNev" class="form-control">
                </div>
                <div class="mb-2">
                    <label class="form-label">Szak</label>
                    <input type="text" id="regTanarSzak" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Tantárgy</label>
                    <select id="regTanarTantargy" class="form-select">
                        <option value="">-- Válassz tantárgyat --</option>
                    </select>
                </div>
                <button class="btn btn-success" onclick="tanarRegisztracio()">Regisztrálás</button>
                <p id="regTanarStatus" class="mt-2"></p>
            </div>
        </div>
    </section>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="Admin.js"></script>
</body>
</html>
