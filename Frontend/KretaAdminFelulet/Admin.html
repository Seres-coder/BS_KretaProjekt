<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Felulet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Admin.css">
</head>
<body>
     <div class="sidebar" id="sidebar">
        <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
        <nav class="nav flex-column">
            <br>Üzenetek:	
            <nav>
                <button class="nav-link" data-view="uzenet-iras-panel">Üzenet Írása</button>
            </nav>
            <br>Adatok:
            <nav>
                <button class="nav-link" data-view="tanar-adatok-panel">Tanárok adatai</button>
                <button class="nav-link" data-view="diak-adatok-panel">Diákok adatai</button>
            </nav>
             <br>Órarend:
            <nav>
                <button class="nav-link" data-view="orarend-panel">Órarendek</button>
                <button class="nav-link" data-view="orarend-mod-panel">Órarend Modosítása</button>
            </nav>
             <br>Tanár fejlesztés:	
            <nav>
                <button class="nav-link" data-view="tanar-fejlesztes-panel">Tanár fejlesztés</button>
            </nav>
        </nav>
    </div>

    <section id="uzenet-iras-panel" class="panel-active">
            <div class="container mt-4">
                <h2>Üzenet írása</h2>
                <div class="card shadow-sm mt-3">
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Címzett</label>
                            <input type="text" class="form-control" id="cimzett" placeholder="pl. Osztályfőnök">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Téma</label>
                            <input type="text" class="form-control" id="tema">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Üzenet</label>
                            <textarea class="form-control" id="szoveg" rows="5"></textarea>
                        </div>
                        <button class="btn btn-primary" onclick="kuldes()">Üzenet küldése</button>
                        <p id="uzenetStatus" class="mt-3"></p>
                    </div>
                </div>
            </div>
        </section>

         <section id="tanar-adatok-panel" class="panel">
            <div class="container mt-4">
                <h2>Tanarok Adatai</h2>
                <div class="card shadow-sm mt-3">
                    <div class="card-body">
                        <div class="card-body">
                            <label class="form-label"><b>Tanár választása:</b></label>
                            <select class="form-select" id="tantargy">
                                <option>A Tanár</option>
                                <option>B Tanár</option>
                                <option>C Tanár</option>
                                <option>D Tanár</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><b>Név:</b></label>
                            <input type="text" class="form-control" id="nev" value="Seres Dániel" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><b>Szak:</b></label>
                            <input type="text" class="form-control" id="szak" value="Matek-Fizika" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><b>Születési dátum:</b></label>
                            <input type="date" class="form-control" id="szuletes" value="2025-10-16" disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><b>Lakcím:</b></label>
                            <input type="text" class="form-control" id="lakcim" value="titok hogy hol lakok" disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><b>Email:</b></label>
                            <input type="email" class="form-control" id="email" value="seres.daniel20k@egressy.info" disabled>
                        </div>
                        <button class="btn btn-warning" onclick="tanarmodositas()">Módosítás</button>
                        <button class="btn btn-success" onclick="tanarmentes()" id="mentesGomb" style="display:none;">Mentés</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="diak-adatok-panel" class="panel">
            <div class="container mt-4">
                <h2>Diákok Adatai</h2>
                <div class="card shadow-sm mt-3">
                    <div class="card-body">
                        <div class="card-body">
                            <label class="form-label"><b>Diák választása:</b></label>
                            <select class="form-select" id="tantargy">
                                <option>A Diak</option>
                                <option>B Diak</option>
                                <option>C Diak</option>
                                <option>D Diak</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><b>Név:</b></label>
                            <input type="text" class="form-control" id="nev" value="Seres Dániel" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><b>Osztaly:</b></label>
                            <input type="text" class="form-control" id="osztaly" value="13.K" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><b>Születési dátum:</b></label>
                            <input type="date" class="form-control" id="szuletes" value="2025-10-16" disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><b>Lakcím:</b></label>
                            <input type="text" class="form-control" id="lakcim" value="titok hogy hol lakok" disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><b>Email:</b></label>
                            <input type="email" class="form-control" id="email" value="seres.daniel20k@egressy.info" disabled>
                        </div>
                         <div class="mb-3">
                            <label class="form-label"><b>Szülő neve:</b></label>
                            <input type="email" class="form-control" id="szulo" value="anya" disabled>
                        </div>
                        <button class="btn btn-warning" onclick="diakmodositas()">Módosítás</button>
                        <button class="btn btn-success" onclick="diakmentes()" id="mentesGomb" style="display:none;">Mentés</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="orarend-panel" class="panel">
            <div class="container mt-4">
                <h2>Órarendek</h2>
                <div class="card shadow-sm mt-3">
                    <div class="card-body">
                        <div class="row g-3 align-items-end">
                            <div class="col-md-4">
                                <label for="osztalySelect" class="form-label"><b>Osztály kiválasztása:</b></label>
                                <select class="form-select" id="osztalySelect">
                                    <option value="">Válassz osztályt...</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-primary" onclick="orarendBetoltes()">
                                    Órarend megjelenítése
                                </button>
                            </div>
                        </div>
                        <hr>
                        <div id="orarendContainer">
                            <p class="text-muted">Válassz egy osztályt az órarend megtekintéséhez.</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="orarend-mod-panel" class="panel">
            <div class="container mt-4">
                <h2>Órarend módosítása</h2>
                <div class="card shadow-sm mt-3">
                    <div class="card-body">
                        <div class="row g-3 align-items-end">
                            <div class="col-md-4">
                                <label for="modOsztalySelect" class="form-label"><b>Osztály kiválasztása:</b></label>
                                <select class="form-select" id="modOsztalySelect">
                                    <option value="">Válassz osztályt...</option>
                                </select>
                            </div>

                            <div class="col-md-3">
                                <button class="btn btn-warning" onclick="szerkeszthetoOrarendBetoltes()">
                                    Órarend betöltése
                                </button>
                            </div>
                        </div>
                        <hr>
                        <div id="orarendModContainer">
                            <p class="text-muted">Válassz egy osztályt az órarend módosításához.</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="Admin.js"></script>
</body>
</html>
