<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanári jegyek</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="KretaJegyekTanar.css">
</head>
<body>

    <div class="sidebar" id="sidebar">
        <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

        <nav class="nav flex-column">
            <a class="nav-link" onclick="window.location.href='../Menu/KretaMenu.html'">Menü</a>
            <a class="nav-link" href="#">Jegyek</a>
            <a class="nav-link" onclick="window.location.href='../Orarend/KretaOrarend.html'">Órarend</a>

            <br>Osztályok:
            <button class="nav-link" onclick="osztalyBetolt(0, '9.A')">9.A</button>
            <button class="nav-link" onclick="osztalyBetolt(1, '10.A')">10.A</button>
            <button class="nav-link" onclick="osztalyBetolt(2, '11.A')">11.A</button>
        </nav>
    </div>

    <div class="content">
        <div class="container mt-4">
            <h2>Tanári jegyek</h2>

            <div class="card shadow-sm mt-3">
                <div class="card-body">
                    <label class="form-label"><b>Tantárgy</b></label>
                    <select class="form-select" id="tantargy">
                        <option>Matematika</option>
                        <option>Magyar</option>
                        <option>Történelem</option>
                        <option>Angol</option>
                    </select>
                </div>
            </div>

            <h4 class="mt-3" id="osztalyNev">9.A</h4>

            <div class="card shadow-sm mt-3">
                <div class="card-body">
                    <table class="table table-striped align-middle">
                        <thead>
                            <tr>
                                <th>Név</th>
                                <th>Típus</th>
                                <th>Jegy</th>
                                <th>Dátum</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="tabla"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="KretaJegyekTanar.js"></script>
</body>
</html>
